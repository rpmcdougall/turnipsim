name: Sync wiki from docs/wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch: {}

# The default GITHUB_TOKEN needs contents: write to push to the wiki repo.
# Wikis live at <repo>.wiki.git and are writable with the repo's token.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Clone wiki repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repo

      - name: Mirror docs/wiki into wiki repo
        run: |
          # Wipe existing .md files at the wiki root so deletions from
          # docs/wiki/ propagate. Preserve .git and any non-.md files
          # (images, etc.) that may live alongside the markdown.
          find wiki-repo -maxdepth 1 -type f -name '*.md' -delete
          cp docs/wiki/*.md wiki-repo/

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already in sync with docs/wiki — nothing to push."
            exit 0
          fi
          git commit -m "Sync wiki from docs/wiki (${GITHUB_SHA:0:7})"
          git push
